<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>work-stream</title>
    <meta name="color-scheme" content="dark">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="has-nav-search">
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo" aria-label="work-stream home">
                <svg class="nav-logo-icon" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                    <path d="M14 14a26 26 0 0 0 0 36M50 14a26 26 0 0 1 0 36" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
                    <path d="M22 22a14 14 0 0 0 0 20M42 22a14 14 0 0 1 0 20" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" opacity=".7"/>
                    <circle cx="32" cy="32" r="8" fill="currentColor"/>
                </svg>
                work-stream
            </a>
            <div class="nav-search">
                <input type="text" class="search-pill" id="searchInput" placeholder="Search for sites..." autocomplete="off">
            </div>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link active"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="about.html" class="nav-link"><i class="fas fa-info-circle"></i> About</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="search-wrapper">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="movies">Movies / TV</button>
                <button class="filter-btn" data-filter="anime">Anime</button>
                <button class="filter-btn" data-filter="manga">Manga</button>
                <button class="filter-btn" data-filter="livetv">Live TV / Sports</button>
                <button class="filter-btn" data-filter="paid">Paid</button>
                <button class="filter-btn" data-filter="apps">Apps</button>
            </div>
        </div>

        <div id="categories-container"></div>

        <footer class="footer">
            <p>Curated with 💜 by the work-stream Team</p>
            <p class="copyright">&copy; 2026 work-stream. All rights reserved.</p>
        </footer>
    </div>

    <button class="scroll-top-btn" id="scrollTopBtn" aria-label="Back to top">
        <svg viewBox="0 0 50 50">
            <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#8b5cf6"/>
                    <stop offset="100%" stop-color="#06b6d4"/>
                </linearGradient>
            </defs>
            <circle class="progress-bg" cx="25" cy="25" r="22"></circle>
            <circle class="progress-ring" id="progressRing" cx="25" cy="25" r="22"></circle>
        </svg>
        <i class="fas fa-arrow-up arrow"></i>
    </button>

    <script>
        // Lazy image loader
        const imgObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                const img = entry.target;
                img.src = img.dataset.src;
                img.addEventListener('load',  () => img.classList.add('loaded'), { once: true });
                img.addEventListener('error', () => img.classList.add('loaded'), { once: true });
                imgObserver.unobserve(img);
            });
        }, { rootMargin: '200px' });

        // Section scroll-reveal
        const sectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                const sec = entry.target;
                sec.classList.add('visible');
                sec.querySelectorAll('.link-card').forEach((card, i) => {
                    setTimeout(() => card.classList.add('visible'), i * 25);
                });
                sectionObserver.unobserve(sec);
            });
        }, { threshold: 0.04, rootMargin: '0px 0px -30px 0px' });

        // Load links from JSON
        async function loadLinks() {
            try {
                const data = await fetch('links.json').then(r => r.json());
                const container = document.getElementById('categories-container');
                const fragment = document.createDocumentFragment();

                data.categories.forEach(category => {
                    const sec = document.createElement('div');
                    sec.className = 'section';
                    sec.setAttribute('data-category', category.id);

                    const header = document.createElement('h2');
                    header.className = 'section-header';
                    header.textContent = category.name;
                    sec.appendChild(header);

                    const grid = document.createElement('div');
                    grid.className = 'links-grid';

                    category.sites.filter(s => s.enabled !== false).forEach(site => {
                        const link = document.createElement('a');
                        link.href = site.url;
                        link.target = '_blank';
                        link.rel = 'noopener noreferrer';
                        link.className = 'link-card';
                        link.setAttribute('data-name', site.name);

                        const img = document.createElement('img');
                        img.dataset.src = site.logo;
                        img.alt = site.name;
                        img.className = 'card-logo';
                        imgObserver.observe(img);

                        link.appendChild(img);
                        grid.appendChild(link);
                    });

                    sec.appendChild(grid);
                    fragment.appendChild(sec);
                    sectionObserver.observe(sec);
                });

                container.appendChild(fragment);
            } catch (e) { console.error('Failed to load links:', e); }
        }

        loadLinks();

        // Search & filter
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        let activeFilter = 'all';

        function applyFilters() {
            const query = searchInput.value.toLowerCase();
            document.querySelectorAll('.section').forEach(sec => {
                const match = activeFilter === 'all' || sec.dataset.category === activeFilter;
                let any = false;
                sec.querySelectorAll('.link-card').forEach(card => {
                    const show = match && card.dataset.name.toLowerCase().includes(query);
                    card.style.display = show ? 'flex' : 'none';
                    if (show) any = true;
                });
                sec.style.display = (match && any) ? 'block' : 'none';
            });
        }

        searchInput.addEventListener('input', applyFilters);
        filterBtns.forEach(btn => btn.addEventListener('click', function() {
            filterBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            activeFilter = this.dataset.filter;
            applyFilters();
        }));

        // Mobile nav
        document.getElementById('navToggle').addEventListener('click', () => {
            document.getElementById('navMenu').classList.toggle('active');
        });

        // Scroll-to-top
        (function() {
            const btn = document.getElementById('scrollTopBtn');
            const ring = document.getElementById('progressRing');
            const C = 2 * Math.PI * 22;
            ring.style.strokeDasharray = C;
            ring.style.strokeDashoffset = C;

            let ticking = false;
            window.addEventListener('scroll', () => {
                if (ticking) return;
                ticking = true;
                requestAnimationFrame(() => {
                    const scrollTop = window.scrollY;
                    const docH = document.documentElement.scrollHeight - window.innerHeight;
                    if (docH > 0) ring.style.strokeDashoffset = C - (scrollTop / docH) * C;
                    btn.classList.toggle('visible', scrollTop > 200);
                    ticking = false;
                });
            }, { passive: true });

            btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        })();
    </script>
</body>
</html>
